services:
  mongo:
    image: mongo:7
    ports:
      - 27017:27017
    command: ["--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "localhost:27017/test",
          "--quiet",
          "--eval",
          "db.runCommand('ping').ok",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  mongo-init:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    entrypoint:
      [
        "mongosh",
        "--host",
        "mongo:27017",
        "--eval",
        "rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'localhost:27017'}]})",
      ]

